<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

header{
text-align:center;
color:white;
padding:30px 20px;
}

header h1{
margin:0;
font-weight:600;
letter-spacing:0.5px;
}

header p{
margin-top:5px;
opacity:0.9;
font-size:14px;
}

.container{
max-width:1050px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.card h3{
margin-top:0;
font-weight:500;
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.summary div{
padding:18px;
border-radius:12px;
color:white;
text-align:center;
}

.summary .masuk{
background:linear-gradient(135deg,#43e97b,#38f9d7);
}

.summary .keluar{
background:linear-gradient(135deg,#ff758c,#ff7eb3);
}

.summary .saldo{
background:linear-gradient(135deg,#667eea,#764ba2);
}

.summary h3{
margin:0;
font-size:15px;
font-weight:500;
}

.summary p{
font-size:24px;
margin-top:5px;
font-weight:600;
}

form{
width:100%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
margin-top:10px;
}

input,select{
padding:11px;
border-radius:8px;
border:1px solid #ddd;
font-family:'Poppins';
font-size:14px;
}

input:focus,select:focus{
outline:none;
border-color:#4facfe;
box-shadow:0 0 0 2px rgba(79,172,254,0.2);
}

button{
padding:11px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
font-weight:500;
cursor:pointer;
transition:0.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.deleteBtn{
background:linear-gradient(135deg,#ff5f6d,#ffc371);
font-size:13px;
padding:6px 10px;
}

.table-container{overflow-x:auto;width:100%;}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
font-size:14px;
}

th{
background:#4facfe;
color:white;
padding:10px;
text-align:left;
font-weight:500;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

tr:hover{
background:#f5fbff;
}

.badgeMasuk{
background:#2ecc71;
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

.badgeKeluar{
background:#e74c3c;
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

footer{
text-align:center;
color:white;
font-size:13px;
padding:15px;
opacity:0.9;
}

</style>
</head>
<body>

<header>
<h1>💰 Money Tracker</h1>
<p>Pencatatan Penggunaan Uang Bulanan</p>
</header>

<div class="container">

<div class="card summary">

<div class="masuk">
<h3>Total Uang Masuk</h3>
<p id="totalMasuk">Rp 0</p>
</div>

<div class="keluar">
<h3>Total Uang Keluar</h3>
<p id="totalKeluar">Rp 0</p>
</div>

<div class="saldo">
<h3>Sisa Saldo</h3>
<p id="saldo">Rp 0</p>
</div>

</div>

<div class="card">
<h3>Tambah Transaksi</h3>

<form onsubmit="event.preventDefault(); tambahTransaksi();">

<select id="jenis">
<option value="masuk">Uang Masuk</option>
<option value="keluar">Uang Keluar</option>
</select>

<input type="text" id="kategori" placeholder="Kategori (makan, gaji, dll)">

<input type="number" id="jumlah" placeholder="Jumlah uang">

<input type="text" id="keterangan" placeholder="Keterangan">

<button type="submit">Tambah</button>

</form>

</div>

<div class="card">
<h3>Riwayat Transaksi</h3>

<div class="table-container">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Kategori</th>
<th>Jumlah</th>
<th>Keterangan</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabelTransaksi"></tbody>
</table>
</div>

</div>

</div>

<footer>
Money Tracker • Local Storage Web App
</footer>

<script>

let transaksi = [];
let currentMonthKey = new Date().getFullYear() + '-' + (new Date().getMonth()+1);

function formatRupiah(angka){
return "Rp " + angka.toLocaleString("id-ID");
}

function simpanData(){
localStorage.setItem("dataTransaksi", JSON.stringify(transaksi));
localStorage.setItem("bulanTransaksi", currentMonthKey);
}

function loadData(){
let savedMonth = localStorage.getItem("bulanTransaksi");

if(savedMonth && savedMonth !== currentMonthKey){
localStorage.removeItem("dataTransaksi");
}

let data = localStorage.getItem("dataTransaksi");
if(data){
transaksi = JSON.parse(data);
}
}

function updateRingkasan(){

let masuk = 0;
let keluar = 0;

transaksi.forEach(t=>{
if(t.jenis === 'masuk') masuk += t.jumlah;
if(t.jenis === 'keluar') keluar += t.jumlah;
});

let saldo = masuk - keluar;

document.getElementById('totalMasuk').innerText = formatRupiah(masuk);
document.getElementById('totalKeluar').innerText = formatRupiah(keluar);
document.getElementById('saldo').innerText = formatRupiah(saldo);

}

function renderTabel(){

let tbody = document.getElementById("tabelTransaksi");
tbody.innerHTML = "";

transaksi.forEach((t,index)=>{

let badge = t.jenis === 'masuk' ? '<span class="badgeMasuk">Masuk</span>' : '<span class="badgeKeluar">Keluar</span>';

let row = `<tr>
<td>${t.tanggal}</td>
<td>${badge}</td>
<td>${t.kategori}</td>
<td>${formatRupiah(t.jumlah)}</td>
<td>${t.keterangan}</td>
<td><button class="deleteBtn" onclick="hapusTransaksi(${index})">Hapus</button></td>
</tr>`;

tbody.innerHTML += row;

});

}

function tambahTransaksi(){

let jenis = document.getElementById("jenis").value;
let kategori = document.getElementById("kategori").value;
let jumlah = parseInt(document.getElementById("jumlah").value);
let keterangan = document.getElementById("keterangan").value;

if(!jumlah || !kategori){
alert("Isi data terlebih dahulu");
return;
}

let now = new Date();
let tanggal = now.toLocaleDateString("id-ID");

transaksi.push({tanggal,jenis,kategori,jumlah,keterangan});

simpanData();
renderTabel();
updateRingkasan();


document.getElementById("kategori").value="";
document.getElementById("jumlah").value="";
document.getElementById("keterangan").value="";

}

function hapusTransaksi(index){
transaksi.splice(index,1);
simpanData();
renderTabel();
updateRingkasan();
}

loadData();
renderTabel();
updateRingkasan();

</script>

</body>
</html>
