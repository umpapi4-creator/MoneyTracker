<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Money Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{box-sizing:border-box}

body{
font-family:'Poppins',sans-serif;
margin:0;
min-height:100vh;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

header{
text-align:center;
color:white;
padding:30px 20px;
}

.container{
max-width:1050px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:22px;
border-radius:16px;
margin-bottom:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

.summary{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
}

.summary div{
padding:18px;
border-radius:12px;
color:white;
text-align:center;
}

.masuk{background:linear-gradient(135deg,#43e97b,#38f9d7);}
.keluar{background:linear-gradient(135deg,#ff758c,#ff7eb3);}
.saldo{background:linear-gradient(135deg,#667eea,#764ba2);}

.summary p{
font-size:22px;
font-weight:600;
}

form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:10px;
}

input,select{
padding:11px;
border-radius:8px;
border:1px solid #ddd;
font-family:'Poppins';
}

button{
padding:11px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#4facfe,#00f2fe);
color:white;
cursor:pointer;
}

.deleteBtn{
background:#ff5f6d;
padding:6px 10px;
}

.table-container{
overflow-x:auto;
overflow-y:auto;
max-height:260px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#4facfe;
color:white;
padding:10px;
position:sticky;
top:0;
}

td{
padding:10px;
border-bottom:1px solid #eee;
}

.badgeMasuk{
background:#2ecc71;
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

.badgeKeluar{
background:#e74c3c;
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
}

footer{
text-align:center;
color:white;
padding:15px;
}

</style>
</head>
<body>

<header>
<h1>💰 Money Tracker</h1>
<p>Pencatatan Penggunaan Uang</p>
</header>

<div class="container">

<div class="card summary">

<div class="masuk">
<h3>Total Masuk (Bulan)</h3>
<p id="totalMasuk">Rp 0</p>
</div>

<div class="keluar">
<h3>Total Keluar (Bulan)</h3>
<p id="totalKeluar">Rp 0</p>
</div>

<div class="saldo">
<h3>Saldo</h3>
<p id="saldo">Rp 0</p>
</div>

<div class="masuk">
<h3>Total Masuk Keseluruhan</h3>
<p id="totalMasukAll">Rp 0</p>
</div>

<div class="keluar">
<h3>Total Keluar Keseluruhan</h3>
<p id="totalKeluarAll">Rp 0</p>
</div>

</div>

<div class="card">

<h3>Tambah Transaksi</h3>

<form onsubmit="event.preventDefault(); tambahTransaksi();">

<select id="jenis">
<option value="keluar">Uang Masuk</option>
<option value="masuk">Uang Keluar</option>
</select>

<select id="kategori">
<option value="">Pilih kategori</option>
<option>Makan</option>
<option>Bensin</option>
<option>Belanja</option>
<option>Gaji</option>
<option>Hiburan</option>
<option>Lainnya</option>
</select>

<input type="text" id="jumlah" placeholder="Jumlah uang">

<input type="text" id="keterangan" placeholder="Keterangan">

<button type="submit">Tambah</button>

</form>

</div>

<div class="card">

<h3>Riwayat Transaksi</h3>

<select id="filterKategori" onchange="filterKategori()">
<option value="all">Semua Transaksi</option>
<option>Makan</option>
<option>Bensin</option>
<option>Belanja</option>
<option>Gaji</option>
<option>Hiburan</option>
<option>Lainnya</option>
</select>

<div class="table-container">
<table>
<thead>
<tr>
<th>Tanggal</th>
<th>Jenis</th>
<th>Kategori</th>
<th>Jumlah</th>
<th>Keterangan</th>
<th>Aksi</th>
</tr>
</thead>
<tbody id="tabelTransaksi"></tbody>
</table>
</div>

<br>
<button onclick="exportExcel()">Export Excel</button>

</div>

</div>

<footer>
Money Tracker • Local Storage
</footer>

<script>

let transaksi=[];
let kategoriFilter="all";

let currentMonthKey=new Date().getFullYear()+"-"+(new Date().getMonth()+1);

let totalMasukAll=parseInt(localStorage.getItem("totalMasukAll"))||0;
let totalKeluarAll=parseInt(localStorage.getItem("totalKeluarAll"))||0;

function formatRupiah(angka){
return "Rp "+angka.toLocaleString("id-ID");
}

function simpanData(){
localStorage.setItem("dataTransaksi",JSON.stringify(transaksi));
localStorage.setItem("bulanTransaksi",currentMonthKey);
localStorage.setItem("totalMasukAll",totalMasukAll);
localStorage.setItem("totalKeluarAll",totalKeluarAll);
}

function loadData(){

let savedMonth=localStorage.getItem("bulanTransaksi");

if(savedMonth && savedMonth!==currentMonthKey){
localStorage.removeItem("dataTransaksi");
}

let data=localStorage.getItem("dataTransaksi");

if(data){
transaksi=JSON.parse(data);
}

}

function updateRingkasan(data){

let masuk=0;
let keluar=0;

data.forEach(t=>{
if(t.jenis==="masuk") masuk+=t.jumlah;
if(t.jenis==="keluar") keluar+=t.jumlah;
});

let saldo=masuk-keluar;

document.getElementById("totalMasuk").innerText=formatRupiah(masuk);
document.getElementById("totalKeluar").innerText=formatRupiah(keluar);
document.getElementById("saldo").innerText=formatRupiah(saldo);

let masukAll=0;
let keluarAll=0;

if(kategoriFilter==="all"){

masukAll=totalMasukAll;
keluarAll=totalKeluarAll;

}else{

transaksi.forEach(t=>{
if(t.kategori===kategoriFilter){
if(t.jenis==="masuk") masukAll+=t.jumlah;
if(t.jenis==="keluar") keluarAll+=t.jumlah;
}
});

}

document.getElementById("totalMasukAll").innerText=formatRupiah(masukAll);
document.getElementById("totalKeluarAll").innerText=formatRupiah(keluarAll);

}

function renderTabel(){

let tbody=document.getElementById("tabelTransaksi");

tbody.innerHTML="";

let dataTampil=transaksi;

if(kategoriFilter!=="all"){
dataTampil=transaksi.filter(t=>t.kategori===kategoriFilter);
}

dataTampil.forEach((t,index)=>{

let badge=t.jenis==="masuk"
?'<span class="badgeMasuk">Masuk</span>'
:'<span class="badgeKeluar">Keluar</span>';

let row=`<tr>
<td>${t.tanggal}</td>
<td>${badge}</td>
<td>${t.kategori}</td>
<td>${formatRupiah(t.jumlah)}</td>
<td>${t.keterangan}</td>
<td><button class="deleteBtn" onclick="hapusTransaksi(${index})">Hapus</button></td>
</tr>`;

tbody.innerHTML+=row;

});

updateRingkasan(dataTampil);

}

function tambahTransaksi(){

let jenis=document.getElementById("jenis").value;
let kategori=document.getElementById("kategori").value;
let jumlah=parseInt(document.getElementById("jumlah").value.replace(/\D/g,""));
let keterangan=document.getElementById("keterangan").value;

if(!jumlah||!kategori){
alert("Isi data terlebih dahulu");
return;
}

let tanggal=new Date().toLocaleDateString("id-ID");

transaksi.push({tanggal,jenis,kategori,jumlah,keterangan});

if(jenis==="masuk") totalMasukAll+=jumlah;
else totalKeluarAll+=jumlah;

simpanData();
renderTabel();

document.getElementById("kategori").value="";
document.getElementById("jumlah").value="";
document.getElementById("keterangan").value="";

}

function hapusTransaksi(index){

transaksi.splice(index,1);

simpanData();
renderTabel();

}

function filterKategori(){

kategoriFilter=document.getElementById("filterKategori").value;

renderTabel();

}

function exportExcel(){

let csv="Tanggal,Jenis,Kategori,Jumlah,Keterangan\n";

transaksi.forEach(t=>{
csv+=`${t.tanggal},${t.jenis},${t.kategori},${t.jumlah},${t.keterangan}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});
let url=window.URL.createObjectURL(blob);

let a=document.createElement("a");
a.href=url;
a.download="money_tracker.csv";
a.click();

}

const jumlahInput=document.getElementById("jumlah");

jumlahInput.addEventListener("input",function(e){

let angka=e.target.value.replace(/\D/g,"");

if(angka===""){
e.target.value="";
return;
}

e.target.value="Rp "+Number(angka).toLocaleString("id-ID");

});

loadData();
renderTabel();

</script>

</body>
</html>
